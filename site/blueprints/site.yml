title: Site

tabs:
  main:
    columns:
      - width: 1/1
        sections:
          site-fields:
            type: fields
            fields:
              festivalyear:
                type: number
                label: Current festival year
                help: Sponsors tagged with this year show under "Current" (with logo); all others show under "Previous". Bump this each edition.
                step: 1
                default: 2026
                width: 1/2
              register_url:
                type: url
                label: Register link URL
                help: External URL for the "Register" nav link. Leave blank to hide it.
              donation_url:
                type: url
                label: Donation link
                help: External link for the "Buy the OAF team a coffee" button on the Sponsor page. Leave blank to hide the button.
              instagram_url:
                type: url
                label: Instagram URL
                help: Link for the footer "Instagram" button. Leave blank to hide it.
              facebook_url:
                type: url
                label: Facebook URL
                help: Link for the footer "Facebook" button. Leave blank to hide it.
          seo-defaults:
            type: fields
            label: SEO / Social defaults
            fields:
              seodescription:
                type: textarea
                label: Default meta description
                buttons: false
                maxlength: 160
                help: Used for search results and social cards on any page without its own description.
              ogimage:
                type: files
                label: Default social share image
                help: Shown when a page is shared on social media and has no image of its own (ideally around 1200×630).
                max: 1
                query: site.find('media').images.filterBy("extension", "in", ["jpg", "jpeg", "png", "webp"])
                uploads:
                  parent: site.find('media')
                  template: image
          pages:
            type: pages
            label: Pages
