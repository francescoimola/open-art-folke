title: Site

tabs:
  pages:
    label: Pages
    icon: dashboard
    columns:
      - width: 1/1
        sections:
          pages:
            type: pages
            label: Pages

  media:
    label: Media
    icon: image
    columns:
      - width: 1/1
        sections:
          library:
            type: pages
            headline: Media library
            templates: media
            status: all
            image: false
            info: "{{ page.images.count }} images, {{ page.videos.count }} videos"

  settings:
    label: Settings
    icon: cog
    columns:
      - width: 1/1
        sections:
          festival:
            type: fields
            label: Festival
            fields:
              festivalyear:
                type: number
                label: Current festival year
                help: Sponsors tagged with this year show under "Current" (with logo); all others show under "Previous".
                step: 1
                default: 2026
                width: 1/2
          links:
            type: fields
            label: Links
            fields:
              register_url:
                type: url
                label: Register link URL
                help: Link to artists registration form. If you want to hide it, leave blank.
              donation_url:
                type: url
                label: Donation link
                help: Donation link. Leave blank to hide the button.
              instagram_url:
                type: url
                label: Instagram URL
                help: Link to Instagram page. Leave blank to hide it.
              facebook_url:
                type: url
                label: Facebook URL
                help: Link to Facebook page. Leave blank to hide it.
          credits:
            type: fields
            label: Credits
            fields:
              media_credits:
                type: textarea
                label: Media credits
                help: Credits text for the footer (videographers, photographers). Links and formatting are supported.
          seo:
            type: fields
            label: SEO / Social defaults
            fields:
              seodescription:
                type: textarea
                label: Default meta description
                buttons: false
                maxlength: 160
                help: Used for search results and social cards on any page without its own description.
              ogimage:
                type: files
                label: Default social share image
                help: Shown when a page is shared on social media and has no image of its own (ideally, keep uploads to 1200×630).
                max: 1
                query: site.find('media').images.filterBy("extension", "in", ["jpg", "jpeg", "png", "webp"])
                uploads:
                  parent: site.find('media')
                  template: image
