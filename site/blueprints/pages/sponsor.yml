title: Sponsor

image:
  query: page.thumbnail.toFile
  back: black
  cover: true

tabs:
  content:
    label: Content
    icon: text
    fields:
      thumbnail:
        type: files
        label: Panel thumbnail
        help: Colourful image shown as this page's tile in the panel page list.
        max: 1
        query: site.find('media').images.filterBy("extension", "in", ["jpg", "jpeg", "png", "webp"])
        uploads:
          parent: site.find('media')
          template: image
      introtitle:
        type: text
        label: Intro heading
      text:
        type: textarea
        label: Intro text
        buttons:
          - bold
          - italic
          - link
          - ul
      featureimage:
        type: files
        label: Feature image
        help: First image at the top of the page.
        max: 1
        query: site.find('media').images.filterBy("extension", "in", ["jpg", "jpeg", "png", "webp"])
        uploads:
          parent: site.find('media')
          template: image
      detailimage:
        type: files
        label: Detail image
        help: Smaller photo, second on the page.
        max: 1
        query: site.find('media').images.filterBy("extension", "in", ["jpg", "jpeg", "png", "webp"])
        uploads:
          parent: site.find('media')
          template: image
      helptitle:
        type: text
        label: Help section title
        help: Headline. Tells users what their support does for OAF.
      helptext:
        type: textarea
        label: Help section text
        buttons:
          - bold
          - italic
          - link
          - ul
      benefits:
        type: structure
        label: Sponsor benefits table
        help: One row per benefit. For each tier cell — leave blank for nothing, type "Yes" for a tick, or type text like "Full page".
        fields:
          benefit:
            type: text
            label: Benefit
          gold:
            type: text
            label: Gold
            width: 1/3
          silver:
            type: text
            label: Silver
            width: 1/3
          bronze:
            type: text
            label: Bronze
            width: 1/3
      sponsors:
        type: structure
        label: Sponsors
        help: One entry per sponsor, across every edition. Tag each with the years they supported — sponsors tagged with the site's current festival year show under "Current" (they need to have a logo); all others show under "Previous", most recent first.
        fields:
          name:
            type: text
            label: Name
          url:
            type: url
            label: Website
          years:
            type: tags
            label: Years supported
            help: e.g. 2024, 2025, 2026. Impacts ordering.
            width: 1/2
          description:
            type: text
            label: Description
            help: Sponsor's website. Optional.
          logo:
            type: files
            label: Logo
            help: Current sponsors only — shown on hover. SVG.
            max: 1
            query: page.files.filterBy("extension", "svg")
            uploads:
              accept: image/svg+xml
  seo:
    extends: tabs/seo
