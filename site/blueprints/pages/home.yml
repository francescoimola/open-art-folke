title: Home

image:
  query: page.thumbnail.toFile
  back: black
  cover: true

tabs:
  content:
    label: Content
    icon: text
    fields:
      thumbnail:
        type: files
        label: Panel thumbnail
        help: Colourful image shown as this page's tile in the panel page list.
        max: 1
        query: site.find('media').images.filterBy("extension", "in", ["jpg", "jpeg", "png", "webp"])
        uploads:
          parent: site.find('media')
          template: image
      heroimage:
        type: files
        label: Hero background
        help: Background photo at the top of the page.
        max: 1
        query: site.find('media').images.filterBy("extension", "in", ["jpg", "jpeg", "png", "webp"])
        uploads:
          parent: site.find('media')
          template: image
      festivalimage:
        type: files
        label: Festival section photo
        help: Photo beside the “Open Art — The Festival” copy.
        max: 1
        query: site.find('media').images.filterBy("extension", "in", ["jpg", "jpeg", "png", "webp"])
        uploads:
          parent: site.find('media')
          template: image
      programmeimage:
        type: files
        label: Programme section photo
        help: Photo in the "Programme” section.
        max: 1
        query: site.find('media').images.filterBy("extension", "in", ["jpg", "jpeg", "png", "webp"])
        uploads:
          parent: site.find('media')
          template: image
      bannerimage:
        type: files
        label: Photo banner background
        help: Background photo behind the closing banner (before footer)
        max: 1
        query: site.find('media').images.filterBy("extension", "in", ["jpg", "jpeg", "png", "webp"])
        uploads:
          parent: site.find('media')
          template: image
      countdownimage:
        type: files
        label: Countdown image
        help: Image revealed as vertical slices in the countdown section.
        max: 1
        query: site.find('media').images.filterBy("extension", "in", ["jpg", "jpeg", "png", "webp"])
        uploads:
          parent: site.find('media')
          template: image
      countdownstart:
        type: date
        label: Countdown start
        default: 2026-01-01
      countdownend:
        type: date
        label: Countdown end
        default: 2026-10-09
  seo:
    extends: tabs/seo
