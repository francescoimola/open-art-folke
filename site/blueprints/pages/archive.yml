title: Archive

fields:
  text:
    type: textarea
    label: Text
    buttons:
      - bold
      - italic
      - link
      - ul
  image1:
    type: files
    label: Image 1
    max: 1
    query: site.find('media').images.filterBy("extension", "in", ["jpg", "jpeg", "png", "webp"])
    uploads:
      parent: site.find('media')
      template: image
  image2:
    type: files
    label: Image 2
    max: 1
    query: site.find('media').images.filterBy("extension", "in", ["jpg", "jpeg", "png", "webp"])
    uploads:
      parent: site.find('media')
      template: image
