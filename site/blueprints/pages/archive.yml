title: Archive

image:
  query: page.thumbnail.toFile
  back: black
  cover: true

tabs:
  content:
    label: Content
    icon: text
    fields:
      thumbnail:
        type: files
        label: Panel thumbnail
        help: Colourful image shown as this page's tile in the panel page list.
        max: 1
        query: site.find('media').images.filterBy("extension", "in", ["jpg", "jpeg", "png", "webp"])
        uploads:
          parent: site.find('media')
          template: image
      headline:
        type: text
        label: Intro heading
      intro:
        type: textarea
        label: Intro text
        help: Leave an empty line to separate a paragraph from the next.
        buttons:
          - bold
          - italic
          - link
      editions:
        type: structure
        label: Past editions
        help: One row per festival edition (most recent first). 
        fields:
          headline:
            type: text
            label: Headline
          text:
            type: textarea
            label: Text
            help: Leave an empty line to separate a parahgraph from the next.
            buttons:
              - bold
              - italic
              - link
              - ul
          video:
            type: files
            label: Video (optional)
            help: Upload an MP4. If your video is over 1 min, please export it WebM for better compression and upload that alongside the MP4 here. The compressed version will be used automatically on devices that support it.
            max: 2
            query: site.find('media').files.filterBy("extension", "in", ["mp4", "webm"])
            uploads:
              parent: site.find('media')
              template: video
          poster:
            type: files
            label: Poster image (optional)
            help: >
              A still image shown before the video plays. If left empty, the
              browser uses the first frame of the video. JPG, PNG or WebP; one
              image per row.
            max: 1
            query: site.find('media').images.filterBy("extension", "in", ["jpg", "jpeg", "png", "webp"])
            uploads:
              parent: site.find('media')
              template: image
          gallery:
            type: files
            label: Photos
            help: Up to 12. Leave empty for none.
            max: 12
            query: site.find('media').images.filterBy("extension", "in", ["jpg", "jpeg", "png", "webp"])
            uploads:
              parent: site.find('media')
              template: image
  seo:
    extends: tabs/seo
