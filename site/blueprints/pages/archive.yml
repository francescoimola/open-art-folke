title: Archive

tabs:
  content:
    label: Content
    icon: text
    fields:
      text:
        type: textarea
        label: Text
        buttons:
          - bold
          - italic
          - link
          - ul
      video:
        type: files
        label: 2025 video
        help: Upload an MP4 (required). Optionally upload a WebM for better compression. WebM will be used automatically in browsers that support it.
        max: 2
        query: site.find('media').files.filterBy("extension", "in", ["mp4", "webm"])
        uploads:
          parent: site.find('media')
          template: video
      image1:
        type: files
        label: Image 1
        max: 1
        query: site.find('media').images.filterBy("extension", "in", ["jpg", "jpeg", "png", "webp"])
        uploads:
          parent: site.find('media')
          template: image
      image2:
        type: files
        label: Image 2
        max: 1
        query: site.find('media').images.filterBy("extension", "in", ["jpg", "jpeg", "png", "webp"])
        uploads:
          parent: site.find('media')
          template: image
  seo:
    extends: tabs/seo
