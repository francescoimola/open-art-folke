title: Archive

tabs:
  content:
    label: Content
    icon: text
    fields:
      text:
        type: textarea
        label: Text
        buttons:
          - bold
          - italic
          - link
          - ul
      video:
        type: files
        label: 2025 video
        help: One MP4 video, shown under the “2025: The Triennial Edition” heading.
        max: 1
        query: page.files.filterBy("extension", "mp4")
        uploads:
          template: video
      image1:
        type: files
        label: Image 1
        max: 1
        query: site.find('media').images.filterBy("extension", "in", ["jpg", "jpeg", "png", "webp"])
        uploads:
          parent: site.find('media')
          template: image
      image2:
        type: files
        label: Image 2
        max: 1
        query: site.find('media').images.filterBy("extension", "in", ["jpg", "jpeg", "png", "webp"])
        uploads:
          parent: site.find('media')
          template: image
  seo:
    extends: tabs/seo
