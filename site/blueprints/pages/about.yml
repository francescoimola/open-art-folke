title: About

image:
  query: page.thumbnail.toFile
  back: black
  cover: true

tabs:
  content:
    label: Content
    icon: text
    fields:
      thumbnail:
        type: files
        label: Panel thumbnail
        help: Colourful image shown as this page's tile in the panel page list.
        max: 1
        query: site.find('media').images.filterBy("extension", "in", ["jpg", "jpeg", "png", "webp"])
        uploads:
          parent: site.find('media')
          template: image
      heroimage:
        type: files
        label: Hero background
        help: Full-width background photo behind the “About Open Art” title.
        max: 1
        query: site.find('media').images.filterBy("extension", "in", ["jpg", "jpeg", "png", "webp"])
        uploads:
          parent: site.find('media')
          template: image
      image1:
        type: files
        label: First photo
        max: 1
        query: site.find('media').images.filterBy("extension", "in", ["jpg", "jpeg", "png", "webp"])
        uploads:
          parent: site.find('media')
          template: image
      image2:
        type: files
        label: Second photo
        max: 1
        query: site.find('media').images.filterBy("extension", "in", ["jpg", "jpeg", "png", "webp"])
        uploads:
          parent: site.find('media')
          template: image
      people:
        type: structure
        label: People
        fields:
          name:
            type: text
            label: Name
          area:
            type: text
            label: Area
            width: 1/2
          role:
            type: text
            label: Role
            width: 1/2
          photo:
            type: files
            label: Photo
            max: 1
            query: site.find('media').images.filterBy("extension", "in", ["jpg", "jpeg", "png", "webp"])
            uploads:
              parent: site.find('media')
              template: image
      principlesimage:
        type: files
        label: Guiding principles background
        help: Full-width background photo behind the “Our guiding principles” card.
        max: 1
        query: site.find('media').images.filterBy("extension", "in", ["jpg", "jpeg", "png", "webp"])
        uploads:
          parent: site.find('media')
          template: image
  seo:
    extends: tabs/seo
